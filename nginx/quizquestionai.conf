upstream quizquestionai_frontend {
    server 127.0.0.1:3005;
    keepalive 64;
}

server {
    listen 80;
    server_name quizquestionai.com www.quizquestionai.com quizquestion.ai www.quizquestion.ai;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name quizquestionai.com www.quizquestionai.com quizquestion.ai www.quizquestion.ai;

    ssl_certificate /etc/letsencrypt/live/quizquestionai.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/quizquestionai.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://quizquestionai_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
